<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍪 Jarvis Clicker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 24px; font-size: 0.9rem; }
        .cookie-section { text-align: center; margin-bottom: 24px; }
        #cookie {
            font-size: 120px; cursor: pointer; display: inline-block;
            transition: transform 0.1s; user-select: none;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
        }
        #cookie:active { transform: scale(0.9); }
        #cookie:hover { transform: scale(1.05); }
        .stats { text-align: center; margin-bottom: 24px; }
        #count { font-size: 3rem; font-weight: bold; background: linear-gradient(45deg, #f6d365, #fda085); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #count-label { font-size: 1rem; color: rgba(255,255,255,0.6); }
        #cps { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .shop { border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .shop h2 { font-size: 1.2rem; margin-bottom: 16px; color: rgba(255,255,255,0.8); }
        .upgrade {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 12px 16px; border-radius: 12px;
            margin-bottom: 8px; transition: all 0.2s; border: 1px solid transparent;
        }
        .upgrade:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.1); }
        .upgrade.disabled { opacity: 0.4; cursor: not-allowed; }
        .upgrade-info { flex: 1; }
        .upgrade-name { font-weight: 600; font-size: 1rem; }
        .upgrade-desc { font-size: 0.8rem; color: rgba(255,255,255,0.5); }
        .upgrade-amount { font-size: 0.75rem; color: rgba(255,255,255,0.3); }
        .upgrade-btn {
            background: linear-gradient(45deg, #667eea, #764ba2); border: none; color: white;
            padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;
            font-size: 0.9rem; transition: transform 0.1s;
        }
        .upgrade-btn:active { transform: scale(0.95); }
        .upgrade.disabled .upgrade-btn { background: linear-gradient(45deg, #555, #444); cursor: not-allowed; }
        .particle {
            position: fixed; pointer-events: none; font-size: 24px;
            animation: floatUp 1s ease-out forwards; z-index: 1000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(0.5); }
        }
        .reset-btn {
            display: block; margin: 20px auto 0; background: none;
            border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.4);
            padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .reset-btn:hover { border-color: rgba(255,255,255,0.4); color: rgba(255,255,255,0.6); }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍪 Jarvis Clicker</h1>
        <p class="subtitle">Clique sur le cookie, deviens riche. Simple.</p>
        <div class="cookie-section"><div id="cookie">🍪</div></div>
        <div class="stats">
            <div><span id="count">0</span> <span id="count-label">cookies</span></div>
            <div id="cps">par seconde: 0</div>
        </div>
        <div class="shop">
            <h2>🏪 Améliorations</h2>
            <div id="upgrades"></div>
        </div>
        <button class="reset-btn" onclick="resetGame()">🔄 Recommencer</button>
    </div>
    <script>
        const UPGRADES = [
            { id: 'click', name: '👆 Click+', desc: '+1 par clic', baseCost: 15, costMult: 1.15, effect: 'click', power: 1 },
            { id: 'cursor', name: '🖱️ Curseur', desc: 'Auto-clic automatique', baseCost: 100, costMult: 1.2, effect: 'cps', power: 1 },
            { id: 'grandma', name: '👵 Mamie', desc: 'Ferme des cookies', baseCost: 500, costMult: 1.25, effect: 'cps', power: 5 },
            { id: 'factory', name: '🏭 Usine', desc: 'Production de masse', baseCost: 3000, costMult: 1.3, effect: 'cps', power: 20 },
            { id: 'mine', name: '⛏️ Mine', desc: 'Minage de cookies', baseCost: 10000, costMult: 1.35, effect: 'cps', power: 100 },
            { id: 'portal', name: '🌀 Portail', desc: 'Cookies dimensionnels', baseCost: 50000, costMult: 1.4, effect: 'cps', power: 500 },
        ];
        let state = { cookies: 0, totalCookies: 0, clickPower: 1, cps: 0, upgrades: {} };
        UPGRADES.forEach(u => state.upgrades[u.id] = 0);
        function loadGame() {
            try {
                const saved = localStorage.getItem('jarvisClicker');
                if (saved) {
                    const p = JSON.parse(saved);
                    state.cookies = p.cookies || 0; state.totalCookies = p.totalCookies || 0;
                    state.clickPower = p.clickPower || 1; state.cps = p.cps || 0;
                    if (p.upgrades) UPGRADES.forEach(u => { state.upgrades[u.id] = p.upgrades[u.id] || 0; });
                }
            } catch(e) {}
        }
        function saveGame() {
            localStorage.setItem('jarvisClicker', JSON.stringify({
                cookies: state.cookies, totalCookies: state.totalCookies,
                clickPower: state.clickPower, cps: state.cps, upgrades: state.upgrades
            }));
        }
        function getCost(u) { return Math.floor(u.baseCost * Math.pow(u.costMult, state.upgrades[u.id])); }
        function createParticle(x, y, text) {
            const p = document.createElement('div'); p.className = 'particle'; p.textContent = text;
            p.style.left = x + 'px'; p.style.top = y + 'px';
            document.body.appendChild(p); setTimeout(() => p.remove(), 1000);
        }
        function clickCookie(e) {
            state.cookies += state.clickPower; state.totalCookies += state.clickPower;
            const r = e.target.getBoundingClientRect();
            createParticle(e.clientX-20+Math.random()*40, e.clientY-20+Math.random()*40, '+'+state.clickPower);
            updateUI(); saveGame();
        }
        function buyUpgrade(id) {
            const u = UPGRADES.find(x => x.id === id); if (!u) return;
            const cost = getCost(u); if (state.cookies < cost) return;
            state.cookies -= cost; state.upgrades[u.id]++;
            if (u.effect === 'click') state.clickPower += u.power;
            else if (u.effect === 'cps') state.cps += u.power;
            updateUI(); saveGame();
        }
        function updateUI() {
            document.getElementById('count').textContent = Math.floor(state.cookies).toLocaleString();
            document.getElementById('cps').textContent = 'par seconde: ' + state.cps.toLocaleString();
            const d = document.getElementById('upgrades'); d.innerHTML = '';
            UPGRADES.forEach(u => {
                const cost = getCost(u), canBuy = state.cookies >= cost, owned = state.upgrades[u.id];
                const div = document.createElement('div');
                div.className = 'upgrade' + (canBuy ? '' : ' disabled');
                let extra = '';
                if (u.effect === 'cps' && owned > 0) extra = '<div class="upgrade-amount">Produit: ' + (u.power * owned).toLocaleString() + ' cookies/s</div>';
                else if (u.effect === 'click' && owned > 0) extra = '<div class="upgrade-amount">+' + (state.clickPower - 1) + ' par clic</div>';
                div.innerHTML = '<div class="upgrade-info"><div class="upgrade-name">'+u.name+' <span style="font-size:0.8rem;color:rgba(255,255,255,0.3)">x'+owned+'</span></div><div class="upgrade-desc">'+u.desc+' — 🍪 '+cost.toLocaleString()+'</div>'+extra+'</div><button class="upgrade-btn" onclick="buyUpgrade(\''+u.id+'\')"'+(canBuy?'':' disabled')+'>Acheter</button>';
                d.appendChild(div);
            });
        }
        function resetGame() { if (confirm('Tout recommencer à zéro ?')) { localStorage.removeItem('jarvisClicker'); location.reload(); } }
        function gameLoop() { if (state.cps > 0) { state.cookies += state.cps / 10; state.totalCookies += state.cps / 10; updateUI(); saveGame(); } }
        loadGame(); updateUI();
        document.getElementById('cookie').addEventListener('click', clickCookie);
        setInterval(gameLoop, 100);
    </script>
</body>
</html>
